name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Repeated pushes to a PR queue redundant lint and test-matrix runs; cancel
# superseded runs on PRs but never on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # The generator emits different code for effect v3 vs v4. Run the full
    # integration suite against both: root deps (incl. the test harness) stay
    # fixed, while tests/ — the code under test — installs the matrix effect.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: effect-v3
            effect: "^3.19"
            vitest: "^0.27"
          - name: effect-v4
            effect: "4.0.0-beta.93"
            vitest: "4.0.0-beta.93"

    name: test (${{ matrix.name }})

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install test fixtures (effect ${{ matrix.effect }})
        # The test run must use a SINGLE vitest instance: tests/ provides
        # `@effect/vitest` + `effect` (the matrix version), but the `vitest`
        # binary and module come from the root package (pinned to a range both
        # @effect/vitest legs accept). --legacy-peer-deps is intentional — it
        # stops npm from auto-installing @effect/vitest's vitest peer into
        # tests/, which would create a second, mismatched vitest instance.
        run: cd tests && npm install --no-save --no-package-lock --legacy-peer-deps effect@${{ matrix.effect }} @effect/vitest@${{ matrix.vitest }}

      - name: Run tests
        run: npm test
